<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 15</title>
</head>
<body>
    <script>
        const usuarios=[
        {nombre:"Ana",roles:["admin","editor"]},
        {nombre:"Luis",roles:["user"]},
        {nombre:"Marta",roles:["editor","user"]},
        {nombre:"Carlos",roles:["admin"]}
        ];
        usuarios.forEach(u=>{
            const puede=u.roles.includes("admin");
            console.log(puede?`${u.nombre}: Acceso permitido`:`${u.nombre}: Acceso denegado`);
        });
    </script>
</body>
</html>
