<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 16</title>
</head>
<body>
    <script>
        const pedidos=[
        {id:"P01",importe:45,entregado:true},
        {id:"P02",importe:120,entregado:false},
        {id:"P03",importe:33.5,entregado:true},
        {id:"P04",importe:89,entregado:true},
        {id:"P05",importe:15,entregado:false}
        ];
        pedidos
        .filter(p=>p.entregado)
        .map(p=>({...p,importeConIVA:Number((p.importe*1.21).toFixed(2))}))
        .sort((a,b)=>b.importeConIVA-a.importeConIVA)
        .forEach(p=>console.log(`${p.id} → ${p.importeConIVA} €`));
    </script>
</body>
</html>
